<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة مستودع الحاسب الآلي - صمام</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; font-family: 'Segoe UI', Tahoma; }
        .hero-section { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 25px; border-bottom: 3px solid #38bdf8; margin-bottom: 20px; }
        .card-custom { background: #1e293b; border: none; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .sensor-val { font-size: 2rem; font-weight: bold; color: #38bdf8; }
        .stock-badge { background: #0f172a; border: 1px solid #38bdf8; border-radius: 10px; padding: 10px; text-align: center; }
        .stock-num { display: block; font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
        #reader { width: 100%; border-radius: 10px; overflow: hidden; background: #000; border: 2px solid #38bdf8; min-height: 250px; }
        .rescan-btn { display: none; margin-top: 10px; width: 100%; font-weight: bold; }
        
        /* زر تفعيل الصوت الإجباري */
        #audio-init-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        
        /* زر كتم الإنذار - واضح جداً */
        #mute-btn { display: none; background-color: #f59e0b; color: black; font-weight: bold; width: 100%; padding: 15px; border-radius: 10px; border: none; margin-top: 10px; font-size: 1.2rem; }
        
        .alert-box { display: none; position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; max-width: 450px; padding: 15px; color: white; text-align: center; border-radius: 10px; font-weight: bold; }
        .alert-danger { background-color: #dc3545; }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div id="audio-init-overlay">
    <button onclick="initSystem()" class="btn btn-primary btn-lg p-4 fw-bold">إضغط هنا لتفعيل نظام الصوت والرقابة 🔊</button>
</div>

<audio id="scan-sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
<audio id="alarm-sound" src="https://www.soundjay.com/buttons/sounds/alarm-clock-01.mp3" preload="auto" loop></audio>

<div id="stock-alert" class="alert-box alert-danger">الصنف المطلوب غير متوفر في المخزن.</div>
<div id="temp-alert" class="alert-box alert-danger blink">🚨 تنبيه: حالة طوارئ بيئية في المستودع!</div>

<div class="hero-section text-center">
    <h2>نظام إدارة مستودع الحاسب الآلي (صمام)</h2>
    <div class="names-list mx-auto mt-2" style="max-width: 950px; font-size: 0.85rem; border: 1px solid #38bdf8; padding: 10px; border-radius: 10px;">
        <strong>فريق العمل:</strong> سالم رفق العنزي وفريقه المبدع
    </div>
</div>

<div class="container">
    <div class="row g-3 mb-4 text-center">
        <div class="col-md col-6"><div class="stock-badge"><small>شواحن</small><span id="count-شواحن" class="stock-num">0</span></div></div>
        <div class="col-md col-6"><div class="stock-badge"><small>طابعات</small><span id="count-طابعات" class="stock-num">0</span></div></div>
        <div class="col-md col-6"><div class="stock-badge"><small>أحبار</small><span id="count-أحبار" class="stock-num">0</span></div></div>
        <div class="col-md col-6"><div class="stock-badge"><small>حواسب</small><span id="count-حواسب" class="stock-num">0</span></div></div>
        <div class="col-md col-12"><div class="stock-badge"><small>فارات/سماعات</small><span id="count-فارات" class="stock-num">0</span></div></div>
    </div>

    <div class="row g-4">
        <div class="col-md-3">
            <div class="card card-custom p-3 text-center h-100">
                <h5 class="mb-3 border-bottom pb-2 text-info">الرقابة البيئية 📡</h5>
                <div class="mb-3"><small>الحرارة</small><div class="sensor-val"><span id="temp">--</span>°C</div></div>
                <div class="mb-3"><small>الرطوبة</small><div class="sensor-val" style="color: #10b981;"><span id="hum">--</span>%</div></div>
                <hr>
                <div id="fire-status" class="fw-bold p-2 rounded">بانتظار البيانات...</div>
                
                <button id="mute-btn" onclick="muteSystem()" class="btn">🔇 إيقاف صوت الإنذار</button>
            </div>
        </div>

        <div class="col-md-9">
            <div class="card card-custom p-4 h-100">
                <div class="row">
                    <div class="col-md-5 text-center">
                        <h6 class="mb-3 text-info">الماسح الآلي 📷</h6>
                        <div id="reader"></div>
                        <button id="rescanButton" onclick="startScanner()" class="btn btn-primary rescan-btn">مسح جديد 🔄</button>
                    </div>
                    <div class="col-md-7 border-start border-secondary">
                        <h5>إدارة العمليات</h5>
                        <div class="row g-3 mt-1">
                            <div class="col-md-8">
                                <select id="itemSelect" class="form-select bg-dark text-white border-secondary">
                                    <option value="شواحن">شواحن لابتوب</option>
                                    <option value="طابعات">طابعات ليزر</option>
                                    <option value="أحبار">أحبار طابعات</option>
                                    <option value="حواسب">أجهزة حاسب (PC)</option>
                                    <option value="فارات">فارات وسماعات</option>
                                </select>
                            </div>
                            <div class="col-md-4"><input type="number" id="qty" class="form-control bg-dark text-white" value="1"></div>
                            <div class="col-12"><input type="text" id="personName" class="form-control bg-dark text-white" placeholder="المستلم"></div>
                            <div class="col-12 d-flex gap-2">
                                <button onclick="sendToFirebase('وارد')" class="btn btn-success flex-fill fw-bold">وارد</button>
                                <button onclick="sendToFirebase('منصرف')" class="btn btn-danger flex-fill fw-bold">منصرف</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = { databaseURL: "https://mashro3-be2b3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const alarmAudio = document.getElementById('alarm-sound');
    const scanAudio = document.getElementById('scan-sound');
    let isInitialized = false;

    // تفعيل النظام (حل مشكلة حظر الصوت)
    function initSystem() {
        document.getElementById('audio-init-overlay').style.display = 'none';
        isInitialized = true;
        // تشغيل صامت لتجهيز المتصفح
        alarmAudio.play().then(() => { alarmAudio.pause(); });
        console.log("System Ready ✅");
    }

    db.ref("Inventory").on("value", (snapshot) => {
        const data = snapshot.val() || {};
        ["شواحن", "طابعات", "أحبار", "حواسب", "فارات"].forEach(item => {
            document.getElementById(`count-${item}`).innerText = data[item] || 0;
        });
    });

    db.ref("WMS").on("value", (snapshot) => {
        const data = snapshot.val() || {};
        let t = parseFloat(data.Temperature) || 0;
        let h = parseFloat(data.Humidity) || 0;
        document.getElementById('temp').innerText = t;
        document.getElementById('hum').innerText = h;

        let isDanger = (t >= 30 || h >= 65);
        if(isDanger) {
            db.ref("System/AlarmTrigger").set("ON");
            document.getElementById('temp-alert').style.display = 'block';
        } else {
            db.ref("System/AlarmTrigger").set("OFF");
            db.ref("System/MutedByAdmin").set(false);
            document.getElementById('temp-alert').style.display = 'none';
        }
    });

    // مراقبة الصوت والزر
    db.ref("System").on("value", (snapshot) => {
        const sys = snapshot.val() || {};
        const trigger = sys.AlarmTrigger === "ON";
        const muted = sys.MutedByAdmin || false;

        if (trigger && !muted && isInitialized) {
            alarmAudio.play();
            document.getElementById('mute-btn').style.display = 'block';
        } else {
            alarmAudio.pause();
            alarmAudio.currentTime = 0;
            if (!trigger) document.getElementById('mute-btn').style.display = 'none';
        }
    });

    function muteSystem() {
        db.ref("System/MutedByAdmin").set(true);
    }

    let scanner;
    function onScanSuccess(decodedText) {
        if(isInitialized) scanAudio.play();
        let parts = decodedText.split(',');
        if(parts.length === 4) {
            let [item, amount, source, action] = parts.map(p => p.trim());
            document.getElementById('itemSelect').value = item;
            document.getElementById('qty').value = amount;
            document.getElementById('personName').value = source;
            sendToFirebase(action);
        }
    }

    function startScanner() {
        scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        scanner.render(onScanSuccess);
    }
    startScanner();

    function sendToFirebase(type) {
        let item = document.getElementById('itemSelect').value;
        let qty = parseInt(document.getElementById('qty').value) || 0;
        let person = document.getElementById('personName').value || "سالم";
        db.ref(`Inventory/${item}`).transaction(c => (type === 'وارد' ? (c||0)+qty : (c||0)-qty));
    }
</script>
</body>
</html>
