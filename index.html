<script>
    const firebaseConfig = { databaseURL: "https://mashro3-be2b3-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let audioCtx = null;
    let alarmOsc = null;
    let localMute = false;
    let html5QrcodeScanner = null; // تعريف الماسح هنا لسهولة التحكم
    let isScanning = true; // القفل لمنع الدبل

    function startAudioContext() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playAlarm() {
        if (!audioCtx || alarmOsc || localMute) return;
        alarmOsc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        alarmOsc.type = 'sawtooth';
        alarmOsc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        alarmOsc.connect(gain); gain.connect(audioCtx.destination);
        alarmOsc.start();
        setInterval(() => { if(alarmOsc && !localMute) { alarmOsc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.4); alarmOsc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.8); } }, 800);
    }

    function stopAlarm() { if (alarmOsc) { alarmOsc.stop(); alarmOsc = null; } }

    function toggleMute() {
        localMute = !localMute;
        db.ref("System/MutedByAdmin").set(localMute);
        updateMuteButton();
        if (localMute) stopAlarm(); else checkAndPlay();
    }

    function updateMuteButton() {
        const btn = document.getElementById('mute-btn');
        if (localMute) { btn.innerText = "🔊 تشغيل الصوت"; btn.className = "btn-alarm-muted"; } 
        else { btn.innerText = "🔇 كتم الصوت"; btn.className = "btn-alarm-active"; }
    }

    function checkAndPlay() {
        db.ref("System/AlarmTrigger").once('value', s => { if(s.val() === "ON" && !localMute) playAlarm(); });
    }

    db.ref("WMS").on("value", (s) => {
        const data = s.val() || {};
        const t = parseFloat(data.Temperature) || 0;
        const h = parseFloat(data.Humidity) || 0;
        const smoke = data.Smoke || 0;

        document.getElementById('temp').innerText = t;
        document.getElementById('hum').innerText = h;
        document.getElementById('smoke-val').innerText = smoke;

        let statusBox = document.getElementById('fire-status');
        
        if(t >= 30 || smoke >= 400 || h >= 65) {
            db.ref("System/AlarmTrigger").set("ON");
            document.getElementById('temp-alert').style.display = 'block';
            statusBox.innerText = h >= 65 ? "🚨 رطوبة عالية!" : "🚨 حالة طوارئ!";
            statusBox.className = "fw-bold p-2 rounded bg-danger text-white blink";
        } else {
            db.ref("System/AlarmTrigger").set("OFF");
            document.getElementById('temp-alert').style.display = 'none';
            statusBox.innerText = "الجو صافي ✅";
            statusBox.className = "fw-bold p-2 rounded bg-success text-white";
            localMute = false; 
            db.ref("System/MutedByAdmin").set(false);
            updateMuteButton();
        }
    });

    db.ref("System").on("value", (s) => {
        const sys = s.val() || {};
        const trigger = sys.AlarmTrigger === "ON";
        document.getElementById('mute-btn').style.display = trigger ? 'block' : 'none';
        if (trigger && !localMute) playAlarm(); else stopAlarm();
    });

    db.ref("Inventory").on("value", (s) => {
        const d = s.val() || {};
        ["شواحن", "طابعات", "أحبار", "حواسب", "فارات"].forEach(i => { document.getElementById(`count-${i}`).innerText = d[i] || 0; });
    });

    db.ref("Logs").limitToLast(10).on("value", (s) => {
        const d = s.val(); let html = "";
        if(d) Object.values(d).reverse().forEach(l => { html += `<tr><td><span class="badge ${l.type === 'وارد' ? 'bg-success' : 'bg-danger'}">${l.type}</span></td><td>${l.item}</td><td>${l.qty}</td><td>${l.person}</td><td>${l.time}</td></tr>`; });
        document.getElementById('logs').innerHTML = html;
    });

    // --- تعديل الماسح لمنع التكرار ---
    function startScanner() {
        isScanning = true; // السماح بالمسح
        document.getElementById('rescanButton').style.display = 'none';
        
        if (html5QrcodeScanner) {
            html5QrcodeScanner.clear(); // تنظيف أي نسخة قديمة
        }

        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        
        html5QrcodeScanner.render((text) => {
            if (isScanning) {
                isScanning = false; // قفل المسح فوراً لمنع التكرار (الدبل)
                
                let p = text.split(',');
                if(p.length === 4) {
                    document.getElementById('itemSelect').value = p[0].trim();
                    document.getElementById('qty').value = p[1].trim();
                    document.getElementById('personName').value = p[2].trim();
                    
                    sendToFirebase(p[3].trim());

                    // إيقاف الكاميرا وإظهار زر "مسح جديد"
                    html5QrcodeScanner.clear().then(() => {
                        document.getElementById('rescanButton').style.display = 'block';
                    }).catch(err => console.error("Failed to clear scanner", err));
                } else {
                    alert("الباركود غير متوافق مع النظام!");
                    isScanning = true; // إعادة فتح القفل إذا كان الكود خطأ
                }
            }
        });
    }

    // تشغيل الماسح عند فتح الصفحة
    startScanner();

    function sendToFirebase(type) {
        let i = document.getElementById('itemSelect').value;
        let q = parseInt(document.getElementById('qty').value) || 0;
        db.ref(`Inventory/${i}`).transaction(c => (type === 'وارد' ? (c||0)+q : (c||0)-q));
        db.ref("Logs").push({ item: i, qty: q, person: document.getElementById('personName').value || "سالم", type, time: new Date().toLocaleTimeString('ar-SA') });
    }

    function clearAllData() { if(confirm("تصفير؟")) { db.ref("Inventory").remove(); db.ref("Logs").remove().then(() => location.reload()); } }
</script>
